services:
  bot:
    build: .              # Собираем образ из Dockerfile в текущей папке
    container_name: it-top_bot
    image: it-top_bot:latest   # Имя образа
    restart: on-failure
    volumes:
      - it-top_bot_files:/app/files   # монтируем папку для SQLite
    environment:
      - BOT_ENV=${BOT_ENV}
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_ENDPOINT=${WEBHOOK_ENDPOINT}
      - DEV_TELEGRAM_ID=${DEV_TELEGRAM_ID}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
    networks:
      - botnet

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./files/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt
    depends_on:
      - bot
    networks:
      - botnet

  certbot:
    image: certbot/certbot
    container_name: certbot_ssl
    profiles: ["prod"]
    volumes:
      - certs:/etc/letsencrypt
      - ./files/nginx.conf:/etc/nginx/conf.d/default.conf
    entrypoint: >
      sh -c "while :; do sleep 6h & wait $$!; 
              certbot renew --webroot -w /var/www/certbot; 
              nginx -s reload; done"

  database:
    image: postgres:15.15
    container_name: postgres_db 
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - botnet

volumes:
  certs:
  it-top_bot_files:
  postgres_data:

networks:
  botnet:
    driver: bridge 
