server {
    listen 80;
    server_name DOMAIN_URL_PLACEHOLDER;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name DOMAIN_URL_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_URL_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_URL_PLACEHOLDER/privkey.pem;

    location /it-top_bot {
        proxy_pass http://it-top_bot:5000/it-top_bot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}